version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: goodbooks-db
    restart: always
    environment:
      POSTGRES_DB: goodbooks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goodbooks-network
    # Exposing DB port to host is optional, but convenient for external inspection
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: goodbooks-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/goodbooks
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - goodbooks-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: goodbooks-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - goodbooks-network

networks:
  goodbooks-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
