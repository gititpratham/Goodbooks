version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: goodbooks-backend
    volumes:
      - goodbooks-data:/app/backend/storage
    environment:
      - DB_PATH=/app/backend/storage/goodbooks.db
      - BOOKS_CSV=/app/backend/db/books.csv
      - TAGS_CSV=/app/backend/db/tags.csv
      - BOOK_TAGS_CSV=/app/backend/db/book_tags.csv
    ports:
      - "18000:18000"
    restart: unless-stopped
    networks:
      - goodbooks-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: goodbooks-frontend
    environment:
      - DOCKER_ENV=true
    ports:
      - "18080:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - goodbooks-net

volumes:
  goodbooks-data:
    name: goodbooks-data

networks:
  goodbooks-net:
    name: goodbooks-net
    driver: bridge
